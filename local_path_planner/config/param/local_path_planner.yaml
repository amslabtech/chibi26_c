/**:
  ros__parameters:
    # パスを可視化するかの設定用
    is_visible: true

    # 制御周波数 [Hz]
    hz: 10 ######

    # frame_id
    robot_frame: "base_link"

    # 速度制限
    max_vel: 2.0 ######              # [m/s]
    max_vel1: 3.0 ######            # [m/s]（平常時）
    max_vel2: 2.0 ######             # [m/s]（減速時）
    avoid_thres_vel: 0.1 ######     # [m/s]（回避中か判断する閾値）
    min_vel: 0.0 ######    
    max_yawrate: 0.0 ######          # [rad/s]
    max_yawrate1: 1.0 ######         # [rad/s]（平常時）
    max_yawrate2: 0.8 ######        # [rad/s]（減速時）        
    turn_thres_yawrate: 0.3 ######  # [rad/s]（旋回中か判断する閾値）
    mode_log_time: 1.0 ######  3.25篠田追加

    # 加速度制限
    max_accel: 2.0 ######    # [m/s^2]
    max_dyawrate: 2.0 ###### # [rad/s^2] 

    # 速度解像度
    vel_reso: 0.01 ######    # [m/s]
    yawrate_reso: 0.01 ###### # [rad/s]

    # 停止状態か判断する閾値
    stop_vel_th: 0.01 ###### 3.25篠田追加
    stop_yawrate_th: 0.01 ###### 3.25篠田追加

    # 時間 [s]
    dt: 0.1 ######
    predict_time1: 1.5 ######
    predict_time2: 1.0 ######

    # 機体サイズ(半径) [m]
    roomba_radius: 0.15 ######
    radius_margin1: 0.10 ######  #（平常時） 
    radius_margin2: 0.05 ###### #（減速時）

    # 重み定数 [-]
    weight_heading1: 0.1 ###### #（平常時）
    weight_heading2: 0.2 ######  #（減速時）
    weight_dist1: 0.4 ######     #（平常時）
    weight_dist2: 0.1 ######     #（減速時）
    weight_vel: 0.01 ######

    # 許容誤差 [m]
    goal_tolerance: 0.2 ######

    # 評価関数distで探索する範囲 [m]
    search_range: 1.2 ######     //1.0 4.08篠田更新